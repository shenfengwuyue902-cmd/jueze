<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>决择 - 决策矩阵工具</title>
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a2e;
  --text-secondary: #666;
  --primary: #6c5ce7;
  --primary-light: #a29bfe;
  --primary-bg: #f0edff;
  --danger: #e74c3c;
  --success: #00b894;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --score-input-bg: #f8f9fa;
}
[data-theme="dark"] {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --border: #2d2d4a;
  --text: #e0e0f0;
  --text-secondary: #8888aa;
  --primary: #a29bfe;
  --primary-bg: #1a1a30;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --score-input-bg: #12122a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background .2s, color .2s;
  min-height: 100vh;
}
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.9);
}
[data-theme="dark"] .app-header { background: rgba(26,26,46,0.95); }
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), #a29bfe);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
}
.logo-sub { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 4px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: 13px; font-family: var(--font);
  transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; user-select: none;
}
.btn:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { opacity: .9; color: #fff; }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: #fdecea; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 18px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.section {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); transition: all .2s;
}
.section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-title .badge {
  background: var(--primary); color: #fff; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px; margin-left: 4px;
}
.step-indicator {
  display: flex; margin-bottom: 24px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.step { cursor: pointer; transition: all .2s; }
.step:hover:not(.active) { background: var(--primary-bg); }
.step {
  flex: 1; padding: 12px 16px; text-align: center; font-size: 13px;
  color: var(--text-secondary); border-right: 1px solid var(--border);
}
.step:last-child { border-right: none; }
.step.active { color: var(--primary); font-weight: 600; background: var(--primary-bg); }
.step .step-num {
  display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
  align-items: center; justify-content: center; background: var(--border);
  color: var(--text-secondary); font-size: 11px; font-weight: 700; margin-right: 6px;
}
.step.active .step-num { background: var(--primary); color: #fff; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.form-row input, .form-row select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--font);
  outline: none; transition: border .2s; flex: 1; min-width: 120px;
}
.form-row input:focus { border-color: var(--primary); }
.form-row input[type="number"] { max-width: 80px; flex: 0; min-width: 60px; }
.form-row .weight-input { display: flex; align-items: center; gap: 8px; }
.form-row .weight-input input { max-width: 60px; }
.weight-label { font-size: 12px; color: var(--text-secondary); }
.item-list { margin-top: 12px; }
.item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  margin-bottom: 6px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
}
.item .item-color { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.item .item-name { flex: 1; font-size: 14px; }
.item .item-detail { font-size: 12px; color: var(--text-secondary); margin-right: 8px; }
.item .btn { flex-shrink: 0; }
.item .btn-move { padding: 2px 6px; font-size: 12px; min-width: 24px; opacity: .5; }
.item .btn-move:hover { opacity: 1; border-color: var(--primary); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
.matrix-wrapper { overflow-x: auto; margin-top: 12px; }
.matrix-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
.matrix-table th {
  background: var(--surface); border-bottom: 2px solid var(--border);
  padding: 10px 8px; text-align: center; font-weight: 600; color: var(--text-secondary); font-size: 12px;
}
.matrix-table th:first-child { text-align: left; min-width: 120px; }
.matrix-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--border); }
.matrix-table td:first-child { text-align: left; font-weight: 500; padding-left: 8px; }
.matrix-table tr:hover td { background: var(--primary-bg); }
.score-input {
  width: 52px; padding: 6px 4px; text-align: center;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--score-input-bg); color: var(--text);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  outline: none; transition: all .2s;
}
.score-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-bg); }
.score-input.high { border-color: #00b894; background: rgba(0,184,148,0.08); }
.score-input.mid { border-color: #fdcb6e; background: rgba(253,203,110,0.08); }
.score-input.low { border-color: #e17055; background: rgba(225,112,85,0.08); }
[data-theme="dark"] .score-input.high { border-color: #00cec9; background: rgba(0,206,201,0.12); }
[data-theme="dark"] .score-input.mid { border-color: #ffeaa7; background: rgba(255,234,167,0.12); }
[data-theme="dark"] .score-input.low { border-color: #ff7675; background: rgba(255,118,117,0.12); }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) {
  .results-grid { grid-template-columns: 1fr; }
  .container { padding: 12px; }
  .section { padding: 16px; }
  .form-row { flex-direction: column; }
  .form-row input { min-width: 100%; }
  .form-row input[type="number"] { max-width: 100%; }
  .app-header { padding: 12px 16px; }
  .header-actions .btn span { display: none; }
  .step { font-size: 11px; padding: 10px 8px; }
  .step .step-num { margin-right: 4px; }
}
.ranking-list { margin-top: 8px; }
.ranking-item { position: relative; overflow: hidden;
.ranking-item {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  margin-bottom: 8px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
}
.ranking-item:first-child { border-color: var(--primary); background: var(--primary-bg); }
.rank-progress { position: absolute; left: 0; bottom: 0; height: 3px; border-radius: 0 0 8px 8px; transition: width .4s ease; opacity: .5; }
.ranking-item:first-child .rank-progress { opacity: .8; }
.score-summary { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.score-summary-item { display: flex; flex-direction: column; align-items: center; padding: 10px 16px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); min-width: 80px; }
.score-summary-item .ss-value { font-size: 20px; font-weight: 700; color: var(--primary); }
.score-summary-item .ss-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
section[id] { scroll-margin-top: 80px; }
.rank-num {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
}
.rank-1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: #fff; }
.rank-2 { background: #b0b0b0; color: #fff; }
.rank-3 { background: #cd7f32; color: #fff; }
.rank-other { background: var(--border); color: var(--text-secondary); }
.rank-name { flex: 1; font-weight: 500; }
.rank-score { font-size: 18px; font-weight: 700; color: var(--primary); }
.rank-detail { font-size: 11px; color: var(--text-secondary); }
.chart-container { position: relative; width: 100%; height: 320px; }
.chart-container canvas { width: 100% !important; height: 100% !important; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000;
  font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.footer { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 12px; }
.color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
.tip { font-size: 12px; color: var(--text-secondary); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.matrix-th-opt { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.matrix-th-opt .color-dot { width: 8px; height: 8px; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header class="app-header">
  <div class="logo">
    <div class="logo-icon">决</div>
    <div>决择 <span class="logo-sub">决策矩阵</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="loadSampleData()"><span>📋</span><span>示例</span></button>
    <button class="btn btn-sm" onclick="exportData()"><span>📤</span><span>导出</span></button>
    <button class="btn btn-sm" onclick="importData()"><span>📥</span><span>导入</span></button>
    <button class="btn btn-sm" onclick="copyResults()"><span>📋</span><span>复制</span></button>
    <button class="btn btn-sm" onclick="resetAll()"><span>🔄</span><span>重置</span></button>
    <button class="btn btn-icon" onclick="toggleTheme()" id="themeToggle" title="切换主题">🌙</button>
  </div>
</header>

<div class="container">
  <div class="step-indicator">
    <div class="step active"><span class="step-num">1</span>设定标准</div>
    <div class="step"><span class="step-num">2</span>添加选项</div>
    <div class="step"><span class="step-num">3</span>打分评估</div>
    <div class="step"><span class="step-num">4</span>分析结果</div>
  </div>

  <div class="section">
    <div class="section-title">
      📊 评估标准 <span class="badge" id="criteriaCount">0 项</span>
    </div>
    <div class="form-row">
      <input type="text" id="criteriaInput" placeholder="标准名称，如：价格、质量、服务..." maxlength="30"
             onkeydown="if(event.key==='Enter') addCriterion()">
      <div class="weight-input">
        <label class="weight-label">权重</label>
        <input type="number" id="weightInput" value="5" min="1" max="10" step="1">
      </div>
      <button class="btn btn-primary" onclick="addCriterion()">+ 添加标准</button>
    </div>
    <div class="item-list" id="criteriaList"></div>
    <div class="tip">💡 权重越高，该标准在最终评分中的重要性越大（1-10分）</div>
  </div>

  <div class="section">
    <div class="section-title">
      🎯 待评估选项 <span class="badge" id="optionsCount">0 项</span>
    </div>
    <div class="form-row">
      <input type="text" id="optionInput" placeholder="选项名称，如：方案A、产品X、学校X..." maxlength="30"
             onkeydown="if(event.key==='Enter') addOption()">
      <button class="btn btn-primary" onclick="addOption()">+ 添加选项</button>
    </div>
    <div class="item-list" id="optionsList"></div>
    <div class="tip">💡 添加你需要比较的所有选项，至少2个才能进行比较</div>
  </div>

  <div class="section">
    <div class="section-title">
      📝 评分矩阵 <span class="badge" id="matrixBadge">—</span>
    </div>
    <div class="empty-state" id="matrixEmpty">
      <div class="empty-icon">📋</div>
      <p>请先在"设定标准"和"添加选项"中添加内容</p>
      <p style="margin-top:8px;font-size:12px;">添加标准和选项后，在此为每个选项针对每条标准打分（1-10分）</p>
    </div>
    <div class="matrix-wrapper" id="matrixWrapper" style="display:none">
      <table class="matrix-table" id="matrixTable">
        <thead id="matrixHead"></thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
    <div class="tip" id="matrixTip" style="display:none">💡 点击单元格进行评分，1=最差，10=最佳。已自动保存。</div>
  </div>

  <div class="section">
    <div class="section-title">
      🏆 分析结果 <span class="badge" id="resultsBadge">—</span>
    </div>
    <div class="empty-state" id="resultsEmpty">
      <div class="empty-icon">📊</div>
      <p>完成评分后，结果将在此显示</p>
    </div>
    <div id="resultsContent" style="display:none">
      <div id="scoreSummary" class="score-summary"></div>
      <div class="results-grid">
        <div>
          <h3 style="font-size:14px;margin-bottom:12px;color:var(--text-secondary)">综合排名</h3>
          <div class="ranking-list" id="rankingList"></div>
        </div>
        <div>
          <h3 style="font-size:14px;margin-bottom:12px;color:var(--text-secondary)">得分对比</h3>
          <div class="chart-container"><canvas id="resultChart"></canvas></div>
        </div>
      </div>
      <div style="margin-top:20px">
        <h3 style="font-size:14px;margin-bottom:12px;color:var(--text-secondary)">评分详情</h3>
        <div class="matrix-wrapper">
          <table class="matrix-table" id="detailTable">
            <thead id="detailHead"></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    决择 · 让每个决定都有据可依 &nbsp;|&nbsp; 数据仅保存在本地浏览器中
  </div>
</div>

<script>
const COLORS = ['#6c5ce7','#00b894','#fdcb6e','#e17055','#0984e3','#d63031','#00cec9','#a29bfe','#e84393','#636e72',
                '#55efc4','#ffeaa7','#fab1a0','#74b9ff','#ff7675','#81ecec','#b2bec3','#fd79a8','#dfe6e9','#fdcb6e'];
let state = { criteria: [], options: [], scores: {} };
let chartInstance = null;

function saveState() { try { localStorage.setItem('jueze_matrix', JSON.stringify(state)); } catch(e) {} }
function loadState() { try { const d = localStorage.getItem('jueze_matrix'); if (d) { state = JSON.parse(d); return true; } } catch(e) {} return false; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleTheme() {
  const d = document.documentElement;
  const isDark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('jueze_theme', isDark ? 'light' : 'dark');
  if (state.criteria.length > 0 && state.options.length > 0) drawChart();
}

function initTheme() {
  const t = localStorage.getItem('jueze_theme');
  if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

function addCriterion() {
  const input = document.getElementById('criteriaInput');
  const weight = parseInt(document.getElementById('weightInput').value) || 5;
  const name = input.value.trim();
  if (!name) { showToast('请输入标准名称'); return; }
  if (state.criteria.some(c => c.name === name)) { showToast('该标准已存在'); return; }
  state.criteria.push({ name, weight: Math.max(1, Math.min(10, weight)) });
  input.value = ''; syncScores(); renderAll(); saveState();
  setTimeout(function(){ document.getElementById('optionsSection').scrollIntoView({behavior:'smooth'}); }, 100);
}

function removeCriterion(index) {
  state.criteria.splice(index, 1);
  state.scores = {}; syncScores(); renderAll(); saveState();
}

function moveCriterion(index, dir) {
  var newIndex = index + dir;
  if (newIndex < 0 || newIndex >= state.criteria.length) return;
  var temp = state.criteria[index];
  state.criteria[index] = state.criteria[newIndex];
  state.criteria[newIndex] = temp;
  state.scores = {}; syncScores(); renderAll(); saveState();
}

function updateWeight(index, val) {
  state.criteria[index].weight = Math.max(1, Math.min(10, parseInt(val) || 1));
  renderAll(); saveState();
}

function updateCriterionName(index, name) {
  state.criteria[index].name = name; renderAll(); saveState();
}

function addOption() {
  const input = document.getElementById('optionInput');
  const name = input.value.trim();
  if (!name) { showToast('请输入选项名称'); return; }
  if (state.options.some(o => o.name === name)) { showToast('该选项已存在'); return; }
  state.options.push({ name });
  input.value = ''; syncScores(); renderAll(); saveState();
  setTimeout(function(){ document.getElementById('optionsSection').scrollIntoView({behavior:'smooth'}); }, 100);
}

function removeOption(index) {
  state.options.splice(index, 1);
  state.scores = {}; syncScores(); renderAll(); saveState();
}

function moveOption(index, dir) {
  var newIndex = index + dir;
  if (newIndex < 0 || newIndex >= state.options.length) return;
  var temp = state.options[index];
  state.options[index] = state.options[newIndex];
  state.options[newIndex] = temp;
  state.scores = {}; syncScores(); renderAll(); saveState();
}

function updateOptionName(index, name) {
  state.options[index].name = name; renderAll(); saveState();
}

function syncScores() {
  const ns = {};
  state.criteria.forEach((c, ci) => {
    state.options.forEach((o, oi) => {
      const key = ci + '-' + oi;
      ns[key] = state.scores[key] || 5;
    });
  });
  state.scores = ns;
}

function setScore(ci, oi, val) {
  state.scores[ci + '-' + oi] = Math.max(1, Math.min(10, parseInt(val) || 5));
  renderResults(); drawChart(); drawDetailTable(); saveState();
}

function scoreColor(val) {
  if (val >= 7) return 'high';
  if (val >= 4) return 'mid';
  return 'low';
}

function getScore(ci, oi) { return state.scores[ci + '-' + oi] || 5; }

function calculate() {
  const results = state.options.map((opt, oi) => {
    let total = 0, max = 0;
    state.criteria.forEach((c, ci) => {
      const s = getScore(ci, oi);
      total += s * c.weight;
      max += 10 * c.weight;
    });
    return { name: opt.name, total, max, pct: max > 0 ? Math.round((total / max) * 100) : 0, score: Math.round(total * 10) / 10 };
  });
  results.sort((a, b) => b.total - a.total);
  return results.map((r, i) => ({ ...r, rank: i + 1 }));
}

function renderCriteria() {
  const list = document.getElementById('criteriaList');
  document.getElementById('criteriaCount').textContent = state.criteria.length + ' 项';
  if (state.criteria.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:16px"><p style="font-size:13px">还没有评估标准，在上方添加</p></div>';
    return;
  }
  list.innerHTML = state.criteria.map((c, i) =>
    '<div class="item">' +
      '<span class="item-color" style="background:' + COLORS[i % COLORS.length] + '"></span>' +
      '<button class="btn btn-sm btn-move" onclick="moveCriterion(' + i + ',-1)" title="上移">▲</button>' +
      '<button class="btn btn-sm btn-move" onclick="moveCriterion(' + i + ',1)" title="下移">▼</button>' +
      '<input type="text" class="item-name" value="' + esc(c.name) + '" maxlength="30" style="border:none;background:transparent;color:var(--text);font-size:14px;flex:1;outline:none;padding:4px" onchange="updateCriterionName(' + i + ', this.value)">' +
      '<span class="item-detail">权重:</span>' +
      '<input type="number" value="' + c.weight + '" min="1" max="10" step="1" style="width:50px;padding:4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);text-align:center;font-size:13px" onchange="updateWeight(' + i + ', this.value)">' +
      '<button class="btn btn-sm btn-danger" onclick="removeCriterion(' + i + ')">✕</button>' +
    '</div>'
  ).join('');
}

function renderOptions() {
  const list = document.getElementById('optionsList');
  document.getElementById('optionsCount').textContent = state.options.length + ' 项';
  if (state.options.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:16px"><p style="font-size:13px">还没有添加选项，在上方添加</p></div>';
    return;
  }
  list.innerHTML = state.options.map((o, i) =>
    '<div class="item">' +
      '<span class="item-color" style="background:' + COLORS[i % COLORS.length] + '"></span>' +
      '<button class="btn btn-sm btn-move" onclick="moveOption(' + i + ',-1)" title="上移">▲</button>' +
      '<button class="btn btn-sm btn-move" onclick="moveOption(' + i + ',1)" title="下移">▼</button>' +
      '<input type="text" value="' + esc(o.name) + '" maxlength="30" style="border:none;background:transparent;color:var(--text);font-size:14px;flex:1;outline:none;padding:4px" onchange="updateOptionName(' + i + ', this.value)">' +
      '<button class="btn btn-sm btn-danger" onclick="removeOption(' + i + ')">✕</button>' +
    '</div>'
  ).join('');
}

function renderMatrix() {
  const wrapper = document.getElementById('matrixWrapper');
  const empty = document.getElementById('matrixEmpty');
  const tip = document.getElementById('matrixTip');
  const badge = document.getElementById('matrixBadge');
  if (state.criteria.length === 0 || state.options.length === 0) {
    wrapper.style.display = 'none'; empty.style.display = 'block'; tip.style.display = 'none';
    badge.textContent = '—'; return;
  }
  wrapper.style.display = 'block'; empty.style.display = 'none'; tip.style.display = 'block';
  badge.textContent = state.criteria.length + '×' + state.options.length;

  let head = '<tr><th>标准 \\ 选项</th>';
  state.options.forEach((o, oi) => {
    head += '<th><div class="matrix-th-opt"><span class="color-dot" style="background:' + COLORS[oi % COLORS.length] + '"></span><span class="opt-name">' + esc(o.name) + '</span></div></th>';
  });
  head += '</tr><tr class="weight-row"><td style="font-weight:400;font-size:11px;color:var(--text-secondary)">权重</td>';
  state.criteria.forEach((c, ci) => {
    head += '<td style="font-size:11px;color:var(--text-secondary)">' + c.weight + '</td>';
  });
  head += '</tr>';
  document.getElementById('matrixHead').innerHTML = head;

  let body = '';
  state.criteria.forEach((c, ci) => {
    body += '<tr><td><span class="color-dot" style="background:' + COLORS[ci % COLORS.length] + '"></span>' + esc(c.name) + '</td>';
    state.options.forEach((o, oi) => {
      const s = getScore(ci, oi);
      var sc = scoreColor(s);
      body += '<td><input type="number" class="score-input ' + sc + '" value="' + s + '" min="1" max="10" step="1" onchange="setScore(' + ci + ',' + oi + ', this.value);this.className=&apos;score-input &apos;+scoreColor(parseInt(this.value)||5)" onfocus="this.select()"></td>';
    });
    body += '</tr>';
  });
  document.getElementById('matrixBody').innerHTML = body;
}

function renderResults() {
  const empty = document.getElementById('resultsEmpty');
  const content = document.getElementById('resultsContent');
  const badge = document.getElementById('resultsBadge');
  if (state.criteria.length === 0 || state.options.length === 0) {
    empty.style.display = 'block'; content.style.display = 'none'; badge.textContent = '—'; return;
  }
  empty.style.display = 'none'; content.style.display = 'block';
  const results = calculate();
  badge.textContent = results.length + ' 项';

  const maxTotal = results[0].total || 1;
  const statDiv = document.getElementById('scoreSummary');
  statDiv.innerHTML = '<div class="score-summary-item"><div class="ss-value">' + results[0].score + '</div><div class="ss-label">最高分</div></div>' +
    '<div class="score-summary-item"><div class="ss-value" style="color:var(--text)">' + results[results.length-1].score + '</div><div class="ss-label">最低分</div></div>' +
    '<div class="score-summary-item"><div class="ss-value" style="color:var(--success)">' + (results[0].score - results[results.length-1].score).toFixed(1) + '</div><div class="ss-label">分差</div></div>' +
    '<div class="score-summary-item"><div class="ss-value">' + results.length + '</div><div class="ss-label">选项数</div></div>';

  const list = document.getElementById('rankingList');
  list.innerHTML = results.map((r, i) => {
    const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    return '<div class="ranking-item">' +
      '<div class="rank-num ' + rc + '">' + r.rank + '</div>' +
      '<div class="rank-name">' + medal + ' ' + esc(r.name) + '</div>' +
      '<div><div class="rank-score">' + r.score + '</div><div class="rank-detail">' + r.pct + '% · 满分 ' + r.max + '</div></div>' +
      '<div class="rank-progress" style="width:' + Math.round((r.total/maxTotal)*100) + '%;background:' + COLORS[i % COLORS.length] + '"></div>' +
    '</div>';
  }).join('');
  drawChart(); drawDetailTable();
}

function drawChart() {
  const canvas = document.getElementById('resultChart');
  if (!canvas || !canvas.parentElement) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width || 600;
  const h = 300;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const results = calculate();
  if (results.length === 0) return;

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#8888aa' : '#666';
  const gridColor = isDark ? '#2d2d4a' : '#e8e8e8';
  const labelColor = isDark ? '#c0c0dd' : '#333';
  const padding = { top: 20, bottom: 45, left: 10, right: 50 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  const sorted = [...results].sort((a, b) => b.total - a.total);
  const count = sorted.length;
  const gap = chartW / count;
  const barW = Math.min(45, gap * 0.55);
  const maxVal = sorted[0].total || 1;

  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + chartH - (chartH * i / 4);
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = textColor;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((i * 25) + '%', padding.left - 6, y + 4);
    ctx.setLineDash([4, 4]);
  }
  ctx.setLineDash([]);

  sorted.forEach((r, i) => {
    const x = padding.left + gap * i + (gap - barW) / 2;
    const barH = (r.total / maxVal) * chartH;
    const y = padding.top + chartH - barH;
    const color = COLORS[i % COLORS.length];
    var grad = ctx.createLinearGradient(x, y, x, padding.top + chartH);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '66');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    ctx.fill();

    ctx.fillStyle = labelColor;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(r.score.toFixed(1), x + barW / 2, y - 6);
    ctx.fillStyle = textColor;
    ctx.font = '11px sans-serif';
    const label = r.name.length > 5 ? r.name.slice(0, 5) + '…' : r.name;
    ctx.fillText(label, x + barW / 2, padding.top + chartH + 16);
    ctx.fillText(r.pct + '%', x + barW / 2, padding.top + chartH + 32);
  });
}

function drawDetailTable() {
  const results = calculate();
  const head = document.getElementById('detailHead');
  const body = document.getElementById('detailBody');
  let h = '<tr><th>选项</th>';
  state.criteria.forEach(c => {
    h += '<th>' + esc(c.name) + '<br><span style="font-size:10px;font-weight:400">(权重 ' + c.weight + ')</span></th>';
  });
  h += '<th>加权总分</th><th>得分率</th></tr>';
  head.innerHTML = h;
  const sorted = [...results].sort((a, b) => b.total - a.total);
  let b = '';
  sorted.forEach((r, ri) => {
    const oi = state.options.findIndex(o => o.name === r.name);
    b += '<tr><td><span class="color-dot" style="background:' + COLORS[ri % COLORS.length] + '"></span>' + esc(r.name) + '</td>';
    state.criteria.forEach((c, ci) => {
      b += '<td>' + getScore(ci, oi) + '</td>';
    });
    b += '<td style="font-weight:700;color:var(--primary)">' + r.score + '</td>';
    b += '<td>' + r.pct + '%</td></tr>';
  });
  body.innerHTML = b;
}

function renderAll() { renderCriteria(); renderOptions(); renderMatrix(); renderResults(); }

function loadSampleData() {
  state = {
    criteria: [{name:'性价比',weight:8},{name:'品牌口碑',weight:6},{name:'功能满足度',weight:9},{name:'售后服务',weight:5},{name:'外观设计',weight:4}],
    options: [{name:'产品A'},{name:'产品B'},{name:'产品C'},{name:'产品D'}],
    scores: {}
  };
  syncScores();
  state.scores = {'0-0':8,'0-1':6,'0-2':7,'0-3':9,'1-0':7,'1-1':8,'1-2':6,'1-3':5,'2-0':9,'2-1':7,'2-2':8,'2-3':6,'3-0':6,'3-1':5,'3-2':7,'3-3':8,'4-0':7,'4-1':9,'4-2':5,'4-3':6};
  renderAll(); saveState(); showToast('已加载示例数据');
}

function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '决择-决策矩阵-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url); showToast('数据已导出');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.criteria && d.options) { state = d; if (!state.scores) { state.scores = {}; syncScores(); } renderAll(); saveState(); showToast('数据已导入'); }
        else { showToast('无效的数据文件'); }
      } catch(err) { showToast('文件格式错误'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function copyResults() {
  const results = calculate();
  if (results.length === 0) { showToast('暂无结果可复制'); return; }
  let text = '🏆 决策矩阵分析结果\n' + '═'.repeat(30) + '\n\n';
  results.forEach((r, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ' + r.rank + '.';
    text += medal + ' ' + r.name + ': ' + r.score + ' 分 (' + r.pct + '%)\n';
  });
  text += '\n' + '─'.repeat(20) + '\n评分标准:\n';
  state.criteria.forEach(c => { text += '  · ' + c.name + ' (权重: ' + c.weight + ')\n'; });
  text += '\n评分详情:\n';
  state.options.forEach((o, oi) => {
    text += '\n' + o.name + ':\n';
    state.criteria.forEach((c, ci) => { text += '  ' + c.name + ': ' + getScore(ci, oi) + '/10\n'; });
  });
  text += '\n📅 ' + new Date().toLocaleDateString('zh-CN');
  navigator.clipboard.writeText(text).then(() => showToast('结果已复制')).catch(() => showToast('复制失败'));
}

function resetAll() {
  if (!confirm('确认重置所有数据？此操作不可撤销。')) return;
  state = { criteria: [], options: [], scores: {} };
  renderAll(); saveState(); showToast('已重置');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = Array.isArray(radii) ? radii.slice(0,4) : [radii||0,radii||0,radii||0,radii||0];
    const m = Math.min(w, h) / 2;
    r[0] = Math.min(r[0]||0, m); r[1] = Math.min(r[1]||0, m);
    r[2] = Math.min(r[2]||0, m); r[3] = Math.min(r[3]||0, m);
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath(); return this;
  };
}

initTheme();
if (!loadState()) { loadSampleData(); }
else { syncScores(); renderAll(); }

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => drawChart(), 200); });
</script>
